name: Actualizador de Datos Shopify

on:
  schedule:
    # Lo forzamos al mínimo permitido por la plataforma (cada 5 minutos)
    # Nota: GitHub puede demorarlo según la carga de sus servidores
    - cron: '*/5 * * * *' 
  workflow_dispatch: # Botón manual de emergencia activo

jobs:
  actualizar-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Preparar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Acelera la instalación de librerías

      - name: Instalar librerías
        run: pip install -r requirements.txt

      - name: Ejecutar el Extractor de Shopify
        env:
          TOKEN_REEBOK: ${{ secrets.TOKEN_REEBOK }}
          TOKEN_COLUMBIA: ${{ secrets.TOKEN_COLUMBIA }}
          TOKEN_CROCS: ${{ secrets.TOKEN_CROCS }}
          TOKEN_KAPPA: ${{ secrets.TOKEN_KAPPA }}
          TOKEN_PICCADILLY: ${{ secrets.TOKEN_PICCADILLY }}
        run: python extractor.py

      - name: Guardar el nuevo CSV en GitHub
        run: |
          git config --global user.name "Robot Distrinando"
          git config --global user.email "robot@distrinando.com"
          git add ventas_hot_sale.csv
          
          # Lógica mejorada: Si hay cambios los sube, si no, deja un aviso claro en la consola
          if git diff --staged --quiet; then
            echo "ℹ️ No entraron pedidos nuevos en este ciclo. El CSV se mantiene igual."
          else
            git commit -m "🔄 Datos actualizados desde Shopify [$(date +'%H:%M:%S')]"
            git push
            echo "✅ Nuevo CSV subido exitosamente a la nube."
          fi
